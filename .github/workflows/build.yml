name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # Required to create releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build in F-Droid's exact buildserver image so the from-source secp256k1
      # .so (and thus the whole APK) is byte-identical to F-Droid's reproducible
      # build. GitHub Actions (checkout/upload/release) run on the host because
      # the buildserver image ships no Node; only the build runs in the container.
      - name: Reproducible build (secp256k1 from source)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          docker run --rm \
            -v "$PWD:/repo" -w /repo \
            -e KEYSTORE_BASE64 -e KEYSTORE_PASSWORD -e KEY_ALIAS -e KEY_PASSWORD \
            registry.gitlab.com/fdroid/fdroidserver:buildserver-trixie \
            bash /repo/.github/reproducible-build.sh

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: metrovault-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
